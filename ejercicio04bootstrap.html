<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio04 Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --etsy-orange: #F1641E;
            --etsy-blue: #2323FF;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        
        .navbar-brand { color: var(--etsy-orange) !important; font-weight: bold; font-size: 2rem; }
        .search-bar { border-radius: 25px; border: 2px solid #222; }
        
        
        .hero-blue {
            background-color: var(--etsy-blue);
            color: white;
            border-radius: 15px 0 0 15px;
            padding: 4rem 2rem;
            height: 100%;
        }
        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0 15px 15px 0;
        }
        .card-accessory {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        
        .category-circle {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .category-card img {
            border-radius: 10px;
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="#">Etsy</a>
        <a class="dropdown-toggle text-dark" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Categorías
        </a>
        <div class="dropdown-menu">
            <a class="dropdown-item" href="#">Regalos</a>
            <a class="dropdown-item" href="#">San Valentin</a>
            <a class="dropdown-item" href="#">Hogar</a>
            <a class="dropdown-item" href="#">Moda</a>
        </div>
        <div class="d-flex flex-grow-1 mx-4">
            <div class="input-group">
                <input type="text" class="form-control search-bar" placeholder="Busca productos aqui">
                <button class="btn btn-outline-dark rounded-circle ms-2" type="button">
                    <i class="bi bi-search"></i> 🔍
                </button>
            </div>
        </div>

        <div class="navbar-nav align-items-center">
            <a class="nav-link px-3" href="#">Entrar</a>
            <a class="nav-link" href="#">🛒</a>
        </div>
    </div>
</nav>

<div class="container-fluid bg-white py-2 mb-4">
    <ul class="nav justify-content-center small fw-bold">
        <li class="nav-item"><a class="nav-link text-dark" href="#">Gifts</a></li>
        <li class="nav-item"><a class="nav-link text-dark" href="#">Valentines Day Gifts</a></li>
        <li class="nav-item"><a class="nav-link text-dark" href="#">Home favorites</a></li>
        <li class="nav-item"><a class="nav-link text-dark" href="#">Fashion</a></li>
        <li class="nav-item"><a class="nav-link text-dark" href="#">Registry</a></li>
        <li class="nav-item"><a class="nav-link text-dark" href="#">Gift cards</a></li>
    </ul>
</div>

</html>
