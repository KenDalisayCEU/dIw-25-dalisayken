<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>

    <style>
        :root {
            --color-fondo-par: #f2f2f2;
            --color-fondo-impar: #ffffff;
            --color-texto: #000;
            --color-sombra: #aaa;
            --espacio-base: 10px;

            --precio-original: 50;
            --precio-descuento: 35;
        }

        body {
            font-family: Arial, sans-serif;
        }

        ul {
            list-style: none;
            padding: 0;
            width: 400px;
        }

        li {
            padding: var(--espacio-base);
            margin-bottom: var(--espacio-base);
            border: 1px solid #ccc;
            position: relative;
        }

        li:nth-child(odd) {
            background-color: var(--color-fondo-impar);
        }

        li:nth-child(even) {
            background-color: var(--color-fondo-par);
        }

        li:hover {
            box-shadow: 2px 2px 8px var(--color-sombra);
        }

        li:not(.agotado) {
            color: var(--color-texto);
        }

        .nuevo::before {
            content: "Nuevo ";
            color: green;
            font-weight: bold;
        }

        .agotado::after {
            content: " (Agotado)";
            color: red;
            font-weight: bold;
        }

        .descripcion::first-line {
            font-weight: bold;
            color: blue;
        }

        .precio {
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <h1>Lista de Productos</h1>

    <ul>
        <li>
            <p class="descripcion">
                Producto 1<br>
                Descripción del producto disponible.
            </p>
            <p class="precio">
                Precio: $<span style="text-decoration: line-through;">50</span> $35
            </p>
        </li>

        <li class="agotado">
            <p class="descripcion">
                Producto 2<br>
                Este producto no está disponible actualmente.
            </p>
            <p class="precio">
                Precio: $50
            </p>
        </li>

        <li class="nuevo">
            <p class="descripcion">
                Producto 3<br>
                Producto recién agregado.
            </p>
            <p class="precio">
                Precio: $<span style="text-decoration: line-through;">50</span> $35
            </p>
        </li>
