<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audio y Video</title>
</head>
<body>

    <h1>Reproductores de Audio y Video</h1>

    
    <h2>Reproductor Audio</h2>

    <audio controls>
        <source src="audio-ejemplo.mp3" type="audio/mpeg">
        <source src="audio-ejemplo.ogg" type="audio/ogg">
        Tu navegador no soporta el elemento
    </audio>

    
    <h2>Reproductor de Video</h2>

    <video controls width="600">
        <source src="video-ejemplo.mp4" type="video/mp4">
        <source src="video-ejemplo.webm" type="video/webm">

        
        <track 
            src="subtitulos-es.vtt" 
            kind="subtitles" 
            srclang="es" 
            label="Español" 
            default>

        Tu navegador no soporta el elemento de video.
    </video>

</body>
</html>
