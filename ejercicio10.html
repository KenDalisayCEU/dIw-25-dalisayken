<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario de Contacto</title>
</head>
<body>

<h2>Formulario de Contacto</h2>

<form id="form-contacto" lang="es" dir="ltr">
  
  <label for="nombre">Nombre:</label>
  <input type="text" 
         id="nombre" 
         name="nombre" 
         title="Introduce tu nombre completo" 
         class="campo-formulario" 
         accesskey="n" 
         tabindex="1" 
         required>
  <br><br>
  
  
  <label for="email">Correo electrónico:</label>
  <input type="email" 
         id="email" 
         name="email" 
         title="Introduce tu correo electrónico" 
         class="campo-formulario" 
         accesskey="e" 
         tabindex="2" 
         required>
  <br><br>
  
  
  <label for="mensaje">Mensaje:</label>
  <textarea id="mensaje" 
            name="mensaje" 
            title="Escribe tu mensaje aquí" 
            class="campo-formulario" 
            accesskey="m" 
            tabindex="3" 
            required></textarea>
  <br><br>
  

  <button type="submit" 
          id="btn-enviar" 
          class="boton-enviar" 
          data-accion="enviar-formulario" 
          accesskey="s" 
          tabindex="4">
    Enviar
  </button>
</form>


<p id="mensaje-exito" hidden>¡Formulario enviado correctamente!</p>

<script>
  
  document.getElementById('form-contacto').addEventListener('submit', function(event) {
    event.preventDefault(); 
    document.getElementById('mensaje-exito').hidden = false;
    
    this.reset();
  });
</script>

</body>
</html>
