<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carousel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    .carousel,
    .carousel-inner,
    .carousel-item {
      height: 100vh;
    }
    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Dropdown
          </a>
          <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
            <li><a class="dropdown-item" href="#">Action</a></li>
            <li><a class="dropdown-item" href="#">Another action</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#">Something else here</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">Disabled</a>
        </li>
      </ul>
      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>



<div id="carouselanimal" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselanimal" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#carouselanimal" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#carouselanimal" data-bs-slide-to="2"></button>
    <button type="button" data-bs-target="#carouselanimal" data-bs-slide-to="3"></button>
  </div>

  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="c:\Users\cyrus\Downloads\images.jfif" alt="Gato">
      <div class="carousel-caption">
        <h5>Gato blanco</h5>
        <p>Un gato blanco juguetón y curioso.</p>
      </div>
    </div>
    <div class="carousel-item">
      <img src="c:\Users\cyrus\Downloads\thumb-1920-522601.jpg" alt="Tigre">
      <div class="carousel-caption">
        <h5>Tigre</h5>
        <p>Un tigre majestuoso y poderoso.</p>
      </div>
    </div>
    <div class="carousel-item">
      <img src="c:\Users\cyrus\Downloads\wallpaperflare.com_wallpaper (1).jpg" alt="Águila">
      <div class="carousel-caption">
        <h5>Águila</h5>
        <p>Un águila majestuosa y veloz.</p>
      </div>
    </div>
    <div class="carousel-item">
      <img src="c:\Users\cyrus\Downloads\wallpaperflare.com_wallpaper.jpg" alt="Ciervo">
      <div class="carousel-caption">
        <h5>Ciervo</h5>
        <p>Un ciervo elegante y ágil.</p>
      </div>
    </div>
  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselanimal" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselanimal" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const dropdownItems = document.querySelectorAll('.dropdown-item');
  const carousel = new bootstrap.Carousel(document.getElementById('carouselanimal'));

  dropdownItems.forEach(item => {
    item.addEventListener('click', e => {
      e.preventDefault();
      const slideIndex = parseInt(item.getAttribute('data-slide'));
      carousel.to(slideIndex);
    });
  });
</script>
</body>
</html>
