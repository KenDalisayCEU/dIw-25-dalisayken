<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista con Estilos CSS</title>
    <style>
        
        #elemento1 {
            background-color: yellow;
        }

        
        li {    
            color: rgb(241, 230, 12);
        }

        
        .especial {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Mi Lista Ordenada</h1>
    <ol>
        <li id="elemento1">Primer elemento</li>
        <li class="especial">Segundo elemento</li>
        <li>Tercer elemento</li>
    </ol>
</body>
</html>
