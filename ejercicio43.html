<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tabla con Grid</title>

<style>
body {
  background: #ddd;
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 150px);
  gap: 1px;
  
}

.celda {
  background-color: rgb(154, 89, 89);
  padding: 25px 0;
  font-weight: bold;
}

.centro {
  text-align: center;
}
</style>

</head>
<body>

<div class="grid">
  <div class="celda centro">celda 1</div>
  <div class="celda centro">celda 2</div>
  <div class="celda centro">celda 3</div>
  <div class="celda centro">celda 4</div>

  <div class="celda centro">celda 5</div>
  <div class="celda centro">ccelda 6</div>
  <div class="celda centro">celda 7</div>
  <div class="celda centro">celda 8</div>

  <div class="celda centro">celda 9</div>
  <div class="celda centro">celda 10</div>
  <div class="celda centro">celda 11</div>
  <div class="celda centro">celda 12</div>
</div>

</body>
</html>
