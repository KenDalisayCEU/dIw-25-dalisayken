<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f5f5f5;
            font-family: sans-serif;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 100px 150px 150px;
            gap: 1px;
            background-color: #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        .celda {
            background-color: #5a6973;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .c1 {
            grid-column: 1 / 4;
        }

        .c2 {
            grid-row: 2 / 4;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="celda c1">celda 1</div>
        <div class="celda c2">celda 2</div>
        <div class="celda c3">celda 3</div>
        <div class="celda c4">celda 4</div>
        <div class="celda c5">celda 5</div>
        <div class="celda c6">celda 6</div>
    </div>

</body>
</html>
