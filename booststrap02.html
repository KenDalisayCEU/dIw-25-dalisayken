<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid - Filas y Columnas</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
  </head>

  <body>

    <div class="container mt-4">

      
      <div class="row mb-4">
        <div class="col bg-primary text-white text-center p-3">Column</div>
        <div class="col bg-secondary text-white text-center p-3">Column</div>
        <div class="col bg-success text-white text-center p-3">Column</div>
      </div>

      
      <div class="row mb-4">
        <div class="col bg-warning text-dark text-center p-3">
          1 of 3
        </div>
        <div class="col-6 bg-danger text-white text-center p-3">
          2 of 3 (wider)
        </div>
        <div class="col bg-info text-dark text-center p-3">
          3 of 3
        </div>
      

      
      <div class="row justify-content-md-center mb-4">
        <div class="col col-lg-2 bg-primary text-white text-center p-3">
          1 of 3
        </div>
        <div class="col-md-auto bg-secondary text-white text-center p-3">
          Variable width content
        </div>
        <div class="col col-lg-2 bg-success text-white text-center p-3">
          3 of 3
        </div>
      </div>

    </div>

  </body>
</html>
