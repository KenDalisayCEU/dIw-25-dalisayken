<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f5f5f5;
            font-family: sans-serif;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 100px 200px 200px;
            grid-template-rows: auto auto auto;
            gap: 1px;
            background-color: #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            
            grid-template-areas: 
                "header header header"
                "sidebar c3 c4"
                "sidebar c5 c6";
        }

        .celda {
            background-color: #5a6973;
            color: white;
            padding: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        
        .c1 { grid-area: header; }
        .c2 { grid-area: sidebar; }
        .c3 { grid-area: c3; }
        .c4 { grid-area: c4; }
        .c5 { grid-area: c5; }
        .c6 { grid-area: c6; }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="celda c1">celda 1</div>
        <div class="celda c2">celda 2</div>
        <div class="celda c3">celda 3</div>
        <div class="celda c4">celda 4</div>
        <div class="celda c5">celda 5</div>
        <div class="celda c6">celda 6</div>
    </div>

</body>
</html>
