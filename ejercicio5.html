<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iframe y SVG</title>
</head>
<body>
    <h1>Iframe y svg</h1>

    <iframe src="https://www.wikipedia.org/" width="600" height="400" frameborder="1"></iframe>

    <h2>Círculo azul con borde negro</h2>
    
    <svg width="200" height="200">
        <circle cx="100" cy="100" r="80" fill="blue" stroke="black" stroke-width="3" />
    </svg>

    <h2>Extra</h2>
<svg width="200" height="200" style="margin-top: 20px;">
    <circle cx="100" cy="100" r="80" fill="white" stroke="red" stroke-width="30" />
    <rect x="0" y="90" width="200" height="30" fill="blue" />
        <text x="100" y="105" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" alignment-baseline="middle">
        UNDERGROUND
    </text>
</svg>

</svg>

    </svg>
</body>
</html>
